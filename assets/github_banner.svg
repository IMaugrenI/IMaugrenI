<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-label="GitHub profile banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b101a"/>
      <stop offset="55%" stop-color="#132132"/>
      <stop offset="100%" stop-color="#1b3140"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d99a"/>
      <stop offset="45%" stop-color="#d9b56d"/>
      <stop offset="100%" stop-color="#9b6d2d"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <g stroke="#2b3f53" stroke-width="1" opacity="0.55">
    <line x1="-50" y1="0" x2="220" y2="500"/>
    <line x1="40" y1="0" x2="310" y2="500"/>
    <line x1="130" y1="0" x2="400" y2="500"/>
    <line x1="220" y1="0" x2="490" y2="500"/>
    <line x1="310" y1="0" x2="580" y2="500"/>
    <line x1="400" y1="0" x2="670" y2="500"/>
    <line x1="490" y1="0" x2="760" y2="500"/>
    <line x1="580" y1="0" x2="850" y2="500"/>
    <line x1="670" y1="0" x2="940" y2="500"/>
  </g>

  <circle cx="1185" cy="250" r="148" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="1185" cy="250" r="108" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.92"/>
  <circle cx="1185" cy="250" r="68" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.85"/>
  <circle cx="1185" cy="250" r="18" fill="#f2dda7" opacity="0.92"/>
  <circle cx="1185" cy="250" r="42" fill="#f2dda7" opacity="0.18" filter="url(#soft)"/>

  <g fill="#f0d99a" opacity="0.9">
    <circle cx="1333" cy="250" r="4"/>
    <circle cx="1313" cy="324" r="4"/>
    <circle cx="1259" cy="378" r="4"/>
    <circle cx="1185" cy="398" r="4"/>
    <circle cx="1111" cy="378" r="4"/>
    <circle cx="1057" cy="324" r="4"/>
    <circle cx="1037" cy="250" r="4"/>
    <circle cx="1057" cy="176" r="4"/>
    <circle cx="1111" cy="122" r="4"/>
    <circle cx="1185" cy="102" r="4"/>
    <circle cx="1259" cy="122" r="4"/>
    <circle cx="1313" cy="176" r="4"/>
  </g>

  <text x="92" y="192" fill="#edf1f6" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="56" font-weight="700">Jakob Kessler</text>
  <text x="96" y="252" fill="#b9c5d0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24">Linux · System Architecture · Modular Design</text>
  <text x="96" y="290" fill="#b9c5d0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24">ToF / V’eth</text>
